version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
      nodejs: 18
  
  pre_build:
    commands:
      - echo Installing frontend dependencies...
      - npm install --legacy-peer-deps
      - echo Building React frontend...
      - npm run build
  
  build:
    commands:
      - echo Building Spring Boot backend with embedded frontend...
      - cd backend
      - mvn clean package -DskipTests
      - cd ..
      - echo Build completed successfully
      - mkdir -p deployment
      - mkdir -p deployment/.ebextensions
      - cp backend/target/coming-soon-backend-0.0.1-SNAPSHOT.jar deployment/
      - cp deployment/Dockerfile deployment/Dockerfile
      - cp .ebextensions/*.config deployment/.ebextensions/
      - echo Deployment package prepared
      - ls -la deployment/

artifacts:
  files:
    - deployment/**/*
  name: branchworks-app-$(date +%Y%m%d-%H%M%S)

cache:
  paths:
    - '/root/.m2/**/*'
    - 'node_modules/**/*'

