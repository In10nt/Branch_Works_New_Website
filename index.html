<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="coming-soon-container">
        <div class="content-layout">
            <div class="left-section">
                <div class="logo">
                    <span>BW</span>
                </div>
                <div class="main-text">
                    <h1>Not everything offshore is hidden. Some things are just getting ready.</h1>
                </div>
                <div class="social-icons">
                    <div class="social-icon">📷</div>
                    <div class="social-icon">💼</div>
                    <div class="social-icon">🐦</div>
                </div>
                <div class="brand-name">Branchworks</div>
            </div>
            <div class="right-section">
                <div class="form-container">
                    <h2>Join the first wave</h2>
                    <form>
                        <div class="form-group">
                            <label>Name</label>
                            <input type="text" placeholder="ex: John">
                        </div>
                        <div class="form-group">
                            <label>Company</label>
                            <input type="text" placeholder="ex : Google">
                        </div>
                        <div class="form-group">
                            <label>Company Size</label>
                            <select>
                                <option>0 - 5</option>
                                <option>6 - 20</option>
                                <option>21 - 50</option>
                                <option>51 - 200</option>
                                <option>200+</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Message</label>
                            <textarea placeholder="I want to..."></textarea>
                            <div class="char-count">0/250</div>
                        </div>
                        <button type="submit" class="join-btn">Join</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
