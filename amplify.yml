version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install --legacy-peer-deps
    build:
      commands:
        - npm run build
        - echo "Copying video files to build directory..."
        - mkdir -p build/Video
        - cp public/Video/video.mp4 build/Video/video.mp4
  artifacts:
    baseDirectory: build
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  customHeaders:
    - pattern: '**/*.webm'
      headers:
        - key: 'Content-Type'
          value: 'video/webm'
        - key: 'Cache-Control'
          value: 'public, max-age=31536000'
    - pattern: '**/*.mp4'
      headers:
        - key: 'Content-Type'
          value: 'video/mp4'
        - key: 'Cache-Control'
          value: 'public, max-age=31536000'
