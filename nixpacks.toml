[phases.setup]
nixPkgs = ['maven', 'jdk17']
aptPkgs = []

[phases.install]
cmds = ['echo "Skipping npm install - this is a Java project"']

[phases.build]
cmds = ['cd backend && mvn clean package -DskipTests']

[start]
cmd = 'cd backend && java -Dserver.port=$PORT -jar target/coming-soon-backend-0.0.1-SNAPSHOT.jar'

[variables]
NIXPACKS_JDK_VERSION = '17'
NIXPACKS_MAVEN_VERSION = '3.9'