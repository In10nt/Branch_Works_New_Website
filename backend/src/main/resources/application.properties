# Server Configuration
server.port=${PORT:7000}

# Database Configuration (H2 for development)
spring.datasource.url=jdbc:h2:mem:comingsoondb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (disable in production)
spring.h2.console.enabled=false

# CORS Configuration (allow all origins since frontend and backend are on same domain)
cors.allowed.origins=*

# SendGrid Configuration
sendgrid.api.key=${SENDGRID_API_KEY}
sendgrid.from.email=${SENDGRID_FROM_EMAIL:nuwangimahesha@gmail.com}

# Company Email (where form submissions will be sent)
company.email=${COMPANY_EMAIL:nuwangimahesha@gmail.com}