# Server Configuration
server.port=${PORT:7000}

# Database Configuration (H2 for development)
spring.datasource.url=jdbc:h2:mem:comingsoondb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# CORS Configuration
cors.allowed.origins=http://localhost:3000

# Logging
logging.level.com.branchworks=DEBUG

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:nuwangimahesha@gmail.com}
spring.mail.password=${MAIL_PASSWORD:cdhmlvvueiqycbfb}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Company Email (where form submissions will be sent)
company.email=${COMPANY_EMAIL:nuwangimahesha@gmail.com}