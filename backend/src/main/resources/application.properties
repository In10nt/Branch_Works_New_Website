# Server Configuration
server.port=5000

# Database Configuration (H2 for development)
spring.datasource.url=jdbc:h2:mem:comingsoondb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (disable in production)
spring.h2.console.enabled=false

# CORS Configuration (allow all origins since frontend and backend are on same domain)
cors.allowed.origins=*

# Logging
logging.level.com.branchworks=INFO

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:nuwangimahesha@gmail.com}
spring.mail.password=${MAIL_PASSWORD:mqkgwnkismtltjmy}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=2000
spring.mail.properties.mail.smtp.timeout=2000
spring.mail.properties.mail.smtp.writetimeout=2000
spring.mail.test-connection=false

# Company Email (where form submissions will be sent)
company.email=${COMPANY_EMAIL:nuwangimahesha@gmail.com}